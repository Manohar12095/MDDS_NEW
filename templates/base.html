<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}MDDS — Multi-Disease Diagnostic System{% endblock %}</title>
<meta name="description" content="{% block desc %}AI-powered multi-disease diagnostic system for Heart, Diabetes, Brain, Kidney and Liver screening.{% endblock %}"/>
<link rel="stylesheet" href="/static/css/style.css"/>
<style>{% block extra_css %}{% endblock %}</style>
</head>
<body>

<canvas id="stars-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>

<!-- Nav -->
<nav>
  <a class="nav-logo" href="/">🏥 MDDS</a>
  <div class="nav-links">
    <a href="/" id="nav-home">Home</a>
    <a href="/page/heart" id="nav-heart">Heart</a>
    <a href="/page/diabetes" id="nav-diabetes">Diabetes</a>
    <a href="/page/brain" id="nav-brain">Brain</a>
    <a href="/page/kidney" id="nav-kidney">Kidney</a>
    <a href="/page/liver" id="nav-liver">Liver</a>
    <a href="/page/chatbot" id="nav-chatbot">AI Chat</a>
    <a href="/page/report" id="nav-report" style="color:#00D4FF;">📄 Report</a>
    <a href="/page/contact" id="nav-contact">Contact</a>
  </div>
</nav>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" style="color:#94a3b8;font-size:14px;font-weight:600;">Analyzing…</div>
</div>

<!-- Page content -->
<div class="page-wrapper" style="position:relative;z-index:1;">
  {% block content %}{% endblock %}
</div>

<!-- Footer with RAHONAM branding -->
<footer>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
    <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 22px;border-radius:50px;
      background:linear-gradient(135deg,rgba(0,212,255,0.12),rgba(123,47,255,0.12));
      border:1px solid rgba(0,212,255,0.3);">
      <span style="font-size:14px;">⚡</span>
      <span style="font-weight:800;font-size:13px;
        background:linear-gradient(135deg,#00D4FF,#7B2FFF);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        letter-spacing:1.5px;">POWERED BY RAHONAM</span>
    </div>
    <div style="color:#475569;font-size:11px;">
      AI-assisted screening only · Not a substitute for medical advice · © 2025 Multi-Disease Diagnostic Portal
    </div>
  </div>
</footer>

<script src="/static/js/app.js"></script>
<script>
// Highlight active nav link
(function(){
  const path = window.location.pathname;
  if (path === '/') document.getElementById('nav-home').classList.add('active');
  else {
    const seg = path.split('/').pop();
    const el = document.getElementById('nav-' + seg);
    if (el) el.classList.add('active');
  }
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
